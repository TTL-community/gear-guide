const net = e => (e.upvotes||0)-(e.downvotes||0);

async function api(action, params={}) {
  const url = window.SCRIPT_URL;
  const noApi = !url || url.includes("PASTE_YOUR");
  if (noApi) throw new Error("no-api");
  // Send everything as GET to avoid CORS preflight (no custom headers needed)
  const payload = JSON.stringify({action, ...params});
  const qs = new URLSearchParams({data: payload});
  const r = await fetch(`${url}?${qs}`, {redirect:"follow"});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error("Bad response: " + text.slice(0,300)); }
}

function sortRows(rows,col,dir){
  const aff=rows.filter(e=>e.affiliated), reg=rows.filter(e=>!e.affiliated);
  const cmp=(a,b)=>{
    let av,bv;
    if(col==="votes"){av=net(a);bv=net(b);}
    else if(col==="brand"){av=(a.brand||"").toLowerCase();bv=(b.brand||"").toLowerCase();}
    else if(col==="model"){av=(a.model||"").toLowerCase();bv=(b.model||"").toLowerCase();}
    else if(col==="type"){av=(a.type||"").toLowerCase();bv=(b.type||"").toLowerCase();}
    else if(col==="reviews"){av=(a.reviews||[]).length;bv=(b.reviews||[]).length;}
    else return 0;
    if(typeof av==="string") return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return dir==="asc"?av-bv:bv-av;
  };
  return [...reg.sort(cmp),...aff.sort(cmp)];
}

        ${search&&html`<button onClick=${()=>setSearch("")} style=${{background:"none",border:"none",color:"#64748B",fontSize:16,padding:0}}>✕</button>`}
      </div>
      <button onClick=${()=>openAdd()} style=${{background:"#FF6B35",color:"white",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:500,fontSize:13,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>+ Add a pick</button>
    </header>

    <div style=${{background:"#FFFBEB",borderBottom:"1px solid #FDE68A"}}>
      <div onClick=${()=>setDisclaimer(d=>!d)} style=${{padding:"10px 24px",display:"flex",gap:9,alignItems:"flex-start",cursor:"pointer"}}>
        <span style=${{color:"#B45309",flexShrink:0,marginTop:2}}>⚠</span>
        <div style=${{flex:1,fontSize:12,color:"#92400E",lineHeight:1.6}}>
          <strong>Disclaimer:</strong> ${disclaimer?"This list is not an official endorsement by TTL leadership or any associated organisation. Recommendations reflect personal experience only. Caveat emptor: do your own research before purchasing. Product quality, pricing, and availability may change.":"Not an official TTL endorsement. Personal experience only. Caveat emptor."}
        </div>
        <span style=${{color:"#D97706",fontSize:11,flexShrink:0}}>${disclaimer?"▲":"▼"}</span>
      </div>
    </div>

    ${apiOff&&html`<div style=${{background:"#FEF9C3",borderBottom:"1px solid #FDE047",padding:"8px 24px",fontSize:12,color:"#854D0E"}}>⚠ Running in demo mode — Apps Script URL not configured. Add entries on this page, then connect the backend to persist data.</div>`}

    <main style=${{padding:"20px 24px",maxWidth:1400,margin:"0 auto"}}>
      ${loading&&html`<div style=${{textAlign:"center",color:"#94A3B8",fontSize:14,padding:40}}>Loading…</div>`}
      ${!loading&&CATS.map(cat=>{
        const rows=getRows(cat.id);
        if(search&&rows.length===0) return null;
        const open=!collapsed[cat.id];
        const sort=sorts[cat.id]||{col:"votes",dir:"desc"};
        return html`<section key=${cat.id} style=${{marginBottom:14,borderRadius:10,border:"1px solid #E2E8F0",background:"white",overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,0.05)"}}>
          <div onClick=${()=>toggle(cat.id)} style=${{padding:"13px 18px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:cat.accent+"0A",borderBottom:open?`1px solid ${cat.accent}25`:"none",userSelect:"none"}}>
            <span style=${{fontSize:18}}>${cat.icon}</span>
            <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:19,fontWeight:700,color:cat.accent,letterSpacing:0.5}}>${cat.label.toUpperCase()}</span>
            <span style=${{fontSize:11,color:"#94A3B8",background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:10,padding:"1px 8px"}}>${rows.length}</span>
            <div style=${{flex:1}}/>
            <button onClick=${e=>{e.stopPropagation();openAdd(cat.id);}} style=${{background:cat.accent+"15",color:cat.accent,border:`1px solid ${cat.accent}35`,borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:3}}>+ Add</button>
            <span style=${{color:"#94A3B8",fontSize:14}}>${open?"▼":"▶"}</span>
          </div>
          ${open&&html`<div style=${{overflowX:"auto"}}>
            ${rows.length===0
              ? html`<div style=${{padding:"22px 18px",textAlign:"center",fontSize:13,color:"#94A3B8"}}>No entries yet — be the first!</div>`
              : html`<table style=${{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>
                  <${SortTh} label="Votes"   col="votes"   sort=${sort} onSort=${c=>setSort(cat.id,c)} center=${true} width=${90}/>
                  <${SortTh} label="Brand"   col="brand"   sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${110}/>
                  <${SortTh} label="Model"   col="model"   sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${150}/>
                  <${SortTh} label="Type"    col="type"    sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${120}/>
                  <th style=${{padding:"7px 10px",textAlign:"center",color:"#6B7280",fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #E2E8F0",background:"#F8FAFC",width:50}}>Link</th>
                  <th style=${{padding:"7px 10px",textAlign:"left",color:"#6B7280",fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #E2E8F0",background:"#F8FAFC",minWidth:160}}>Good for</th>
                  <${SortTh} label="Reviews" col="reviews" sort=${sort} onSort=${c=>setSort(cat.id,c)}/>
                  <th style=${{padding:"7px 10px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",width:64}}/>
                </tr></thead>
                <tbody>
                  ${rows.map((e,i)=>{
                    const isAff=e.affiliated;
                    return html`<tr key=${e.id} style=${{borderBottom:"1px solid #F1F5F9",background:isAff?"#F8FAFC":i%2===0?"white":"#FAFAFA",opacity:isAff?0.72:1}}>
                      <td style=${{padding:"10px",textAlign:"center",verticalAlign:"top"}}>
                        <${VoteCell} entry=${e} onUp=${()=>upvote(e.id)} onDown=${()=>downvote(e.id)}/>
                        ${isAff&&html`<div style=${{fontSize:10,color:"#94A3B8",marginTop:5,fontStyle:"italic",background:"#F1F5F9",borderRadius:4,padding:"1px 5px"}}>affiliated</div>`}
                      </td>
                      <td style=${{padding:"10px",fontWeight:500,color:isAff?"#94A3B8":"#1E293B",verticalAlign:"top"}}>${e.brand||html`<span style=${{color:"#CBD5E1"}}>—</span>`}</td>
                      <td style=${{padding:"10px",color:isAff?"#94A3B8":"#334155",verticalAlign:"top"}}>${e.model}</td>
                      <td style=${{padding:"10px",color:"#64748B",fontSize:12,verticalAlign:"top"}}>${e.type||html`<span style=${{color:"#CBD5E1"}}>—</span>`}</td>
                      <td style=${{padding:"10px",textAlign:"center",verticalAlign:"top"}}>
                        ${e.url?html`<a href=${e.url} target="_blank" rel="noopener noreferrer" style=${{color:"#6366F1",fontSize:16}}>↗</a>`:html`<span style=${{color:"#E2E8F0"}}>—</span>`}
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top"}}>
                        <div style=${{display:"flex",flexWrap:"wrap",gap:2}}>
                          ${(e.recFor||[]).map(r=>html`<${RecTag} key=${r} id=${r}/>`)}
                          ${(!e.recFor||e.recFor.length===0)&&html`<span style=${{color:"#CBD5E1",fontSize:12}}>—</span>`}
                        </div>
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top",minWidth:220,maxWidth:320}}>
                        <${ReviewsCell} entry=${e}
                          onAddReview=${id=>{setReviewForm({text:"",name:""});setModal({type:"addReview",entryId:id});}}
                          onEditReview=${(eid,rv)=>{setReviewForm({text:rv.text,name:rv.name||""});setModal({type:"editReview",entryId:eid,review:rv});}}
                          onDeleteReview=${deleteReview}/>
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top",textAlign:"center"}}>
                        <div style=${{display:"flex",flexDirection:"column",gap:6,alignItems:"center"}}>
                          <button onClick=${()=>openEdit(e)} style=${{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 7px",display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748B"}}>✏ edit</button>
                          <button onClick=${()=>setModal({type:"deleteEntry",entryId:e.id})} style=${{background:"#FFF1F2",border:"1px solid #FECACA",borderRadius:6,padding:"4px 7px",display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#DC2626"}}>🗑 delete</button>
                        </div>
                      </td>
                    </tr>`;
                  })}
                </tbody>
              </table>`}
          </div>`}
        </section>`;
      })}
    </main>

    <!-- Affiliation modal -->
    ${modal?.type==="affiliation"&&html`<div style=${{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
      <div style=${{background:"white",borderRadius:14,padding:32,width:"100%",maxWidth:440,boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
        <div style=${{fontSize:18,fontWeight:500,color:"#0F172A",marginBottom:10}}>Before you submit</div>
        <p style=${{fontSize:13,color:"#475569",lineHeight:1.75,marginBottom:24}}>Are you affiliated with or sponsored by the company you're recommending?<br/><br/><span style=${{fontSize:12,color:"#94A3B8"}}>Affiliated submissions are welcome — they'll be clearly labelled.</span></p>
        <div style=${{display:"flex",gap:12}}>
          <button onClick=${()=>{setForm(p=>({...p,affiliated:false}));setModal({type:"addEntry",affiliated:false,cat:modal.cat});}} style=${{flex:1,padding:"12px",borderRadius:9,border:"1.5px solid #16A34A",background:"#F0FDF4",color:"#16A34A",fontWeight:500,fontSize:13}}>No — independent user</button>
          <button onClick=${()=>{setForm(p=>({...p,affiliated:true}));setModal({type:"addEntry",affiliated:true,cat:modal.cat});}} style=${{flex:1,padding:"12px",borderRadius:9,border:"1.5px solid #E2E8F0",background:"#F8FAFC",color:"#64748B",fontWeight:500,fontSize:13}}>Yes — affiliated</button>
        </div>
        <button onClick=${()=>setModal(null)} style=${{background:"none",border:"none",color:"#94A3B8",fontSize:12,marginTop:16,width:"100%",textAlign:"center"}}>Cancel</button>
      </div>
    </div>`}

    <!-- Add/Edit entry modal -->
    ${(modal?.type==="addEntry"||modal?.type==="editEntry")&&html`<div style=${{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:999,padding:"40px 20px",overflowY:"auto"}}>
      <${EntryFormContent}/>
    </div>`}

    <!-- Delete confirm -->
    ${modal?.type==="deleteEntry"&&html`<div style=${{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
      <div style=${{background:"white",borderRadius:14,padding:28,width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
        <div style=${{fontSize:17,fontWeight:500,color:"#0F172A",marginBottom:10}}>Delete this entry?</div>
        <p style=${{fontSize:13,color:"#64748B",lineHeight:1.6,marginBottom:20}}>${modalEntry&&html`<span><strong>${modalEntry.brand?modalEntry.brand+" ":""}${modalEntry.model}</strong> and all its reviews will be permanently removed.</span>`}</p>
        <div style=${{display:"flex",gap:10}}>
          <button onClick=${()=>setModal(null)} style=${{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"white",color:"#64748B",fontWeight:500,fontSize:13}}>Cancel</button>
          <button onClick=${()=>doDeleteEntry(modal.entryId)} style=${{flex:1,padding:"10px",borderRadius:8,border:"none",background:"#DC2626",color:"white",fontWeight:500,fontSize:13}}>Yes, delete</button>
        </div>
      </div>
    </div>`}

    <!-- Add/Edit review modal -->
    ${(modal?.type==="addReview"||modal?.type==="editReview")&&html`<div style=${{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
      <div style=${{background:"white",borderRadius:14,padding:28,width:"100%",maxWidth:460,boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#0F172A"}}>${modal?.type==="editReview"?"Edit review":"Add a review"}</span>
          <button onClick=${()=>setModal(null)} style=${{background:"none",border:"none",fontSize:20,color:"#94A3B8",lineHeight:1}}>✕</button>
        </div>
        ${modalEntry&&html`<p style=${{fontSize:12,color:"#94A3B8",marginBottom:12}}>${modalEntry.brand?modalEntry.brand+" ":""}${modalEntry.model}</p>`}
        <label style=${FLD}>Review *</label>
        <textarea value=${reviewForm.text} onInput=${e=>setReviewForm(p=>({...p,text:e.target.value}))} placeholder="Your honest take…" rows=${4} style=${{...INP,resize:"vertical"}}></textarea>
        <label style=${FLD}>Your name / WhatsApp name (optional)</label>
        <input value=${reviewForm.name} onInput=${e=>setReviewForm(p=>({...p,name:e.target.value}))} placeholder="Anonymous if blank" style=${INP}/>
        <div style=${{display:"flex",gap:10,marginTop:20}}>
          <button onClick=${()=>setModal(null)} style=${{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"white",color:"#64748B",fontWeight:500,fontSize:13}}>Cancel</button>
          <button onClick=${modal?.type==="editReview"?submitEditReview:submitReview} disabled=${saving} style=${{flex:2,padding:"10px",borderRadius:8,border:"none",background:!reviewForm.text.trim()||saving?"#CBD5E1":"#FF6B35",color:"white",fontWeight:500,fontSize:13}}>${saving?"Saving…":modal?.type==="editReview"?"Save changes":"Add review"}</button>
        </div>
      </div>
    </div>`}

  </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>

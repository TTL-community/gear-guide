const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const net = e => (e.upvotes||0) - (e.downvotes||0);

// localStorage vote tracking
const VOTE_KEY = "ttl-votes-v1";
function loadVotes() { try { return JSON.parse(localStorage.getItem(VOTE_KEY)||"{}"); } catch(_){return{};} }
function saveVotes(v) { try { localStorage.setItem(VOTE_KEY, JSON.stringify(v)); } catch(_){} }

function sortRows(rows, col, dir) {
  const aff = rows.filter(e=>e.affiliated), reg = rows.filter(e=>!e.affiliated);
  const cmp = (a,b) => {
    let av,bv;
    if(col==="votes"){av=net(a);bv=net(b);}
    else if(col==="brand"){av=(a.brand||"").toLowerCase();bv=(b.brand||"").toLowerCase();}
    else if(col==="model"){av=(a.model||"").toLowerCase();bv=(b.model||"").toLowerCase();}
    else if(col==="type"){av=(a.type||"").toLowerCase();bv=(b.type||"").toLowerCase();}
    else if(col==="reviews"){av=(a.reviews||[]).length;bv=(b.reviews||[]).length;}
    else return 0;
    if(typeof av==="string") return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return dir==="asc"?av-bv:bv-av;
  };
  return [...reg.sort(cmp),...aff.sort(cmp)];
}

// ‚îÄ‚îÄ API ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const SURL = window.SCRIPT_URL;
const hasApi = SURL && !SURL.includes("PASTE_YOUR");

async function apiFetch(action, params={}) {
  if(!hasApi) throw new Error("no-api");
  const qs = new URLSearchParams({data: JSON.stringify({action,...params})});
  const r = await fetch(`${SURL}?${qs}`, {redirect:"follow"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const txt = await r.text();
  try { return JSON.parse(txt); } catch(e) { throw new Error("Bad response: "+txt.slice(0,200)); }
}

function VoteCell({entry, myVote, onVote}) {
  const n = net(entry);
  let fg="#94A3B8",bg="#F8FAFC",bd="#E2E8F0";
  if(n>0&&n<6){fg="#16A34A";bg="#F0FDF4";bd="#86EFAC";}
  if(n>=6&&n<16){fg="#2563EB";bg="#EFF6FF";bd="#93C5FD";}
  if(n>=16){fg="#EA580C";bg="#FFF7ED";bd="#FED7AA";}
  if(n<0){fg="#DC2626";bg="#FFF1F2";bd="#FECACA";}
  return html`<div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
    <div style=${{display:"flex",gap:3}}>
      <button onClick=${()=>onVote("up")} title=${myVote==="up"?"Undo upvote":"Upvote"}

        <span style=${{fontSize:11,fontWeight:500,color:myVote==="up"?"#16A34A":"#94A3B8"}}>${entry.upvotes||0}</span>
      </button>

    ${myVote && html`<span style=${{fontSize:9,color:"#94A3B8"}}>tap to undo</span>`}
  </div>`;
}

    <div style=${{display:"flex",gap:10,marginTop:18}}>
      <button onClick=${onCancel} style=${{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"white",color:"#64748B",fontWeight:500,fontSize:13}}>Cancel</button>
      <button onClick=${onSubmit} disabled=${saving}
        style=${{flex:2,padding:"10px",borderRadius:8,border:"none",color:"white",fontWeight:500,fontSize:13,background:(!form.model.trim()||saving)?"#CBD5E1":"#FF6B35"}}>
        ${saving?"Saving‚Ä¶":isEdit?"Save changes":"Submit pick"}
      </button>
    </div>
    <p style=${{fontSize:11,color:"#CBD5E1",marginTop:10,textAlign:"center"}}>Not an official TTL endorsement.</p>
  </div>`;
}

// ‚îÄ‚îÄ Review Form ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function ReviewForm({entry, existingReview, saving, onCancel, onSubmit}) {
  const [text,setText] = useState(existingReview?.text||"");
  const [name,setName] = useState(existingReview?.name||"");
  const isEdit = !!existingReview;
  return html`<div style=${{...CARD,maxWidth:460}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#0F172A"}}>${isEdit?"Edit review":"Add a review"}</span>
      <button onClick=${onCancel} style=${{background:"none",border:"none",fontSize:20,color:"#94A3B8",lineHeight:1}}>‚úï</button>
    </div>
    ${entry && html`<p style=${{fontSize:12,color:"#94A3B8",marginBottom:12}}>${(entry.brand?entry.brand+" ":"")+entry.model}</p>`}
    <label style=${FLD}>Review *</label>
    <textarea value=${text} onChange=${e=>setText(e.target.value)}
      placeholder="Your honest take ‚Äî fit, feel, performance, caveats‚Ä¶"
      rows="4" style=${{...INP,resize:"vertical"}}></textarea>
    <label style=${FLD}>Your name / WhatsApp name (optional)</label>
    <input value=${name} onChange=${e=>setName(e.target.value)} placeholder="Anonymous if blank" style=${INP}/>
    <div style=${{display:"flex",gap:10,marginTop:18}}>
      <button onClick=${onCancel} style=${{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"white",color:"#64748B",fontWeight:500,fontSize:13}}>Cancel</button>
      <button onClick=${()=>onSubmit({text,name:name||"Anonymous"})} disabled=${saving||!text.trim()}
        style=${{flex:2,padding:"10px",borderRadius:8,border:"none",color:"white",fontWeight:500,fontSize:13,background:(saving||!text.trim())?"#CBD5E1":"#FF6B35"}}>
        ${saving?"Saving‚Ä¶":isEdit?"Save changes":"Add review"}
      </button>
    </div>
  </div>`;
}

// ‚îÄ‚îÄ Main App ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const emptyForm = (cat="",affiliated=false) => ({cat,brand:"",model:"",type:"",url:"",recFor:[],affiliated,reviewText:"",reviewName:""});

function App() {
  const [entries,    setEntries]    = useState(SEED);
  const [apiErr,     setApiErr]     = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [saving,     setSaving]     = useState(false);
  // All clusters start CLOSED; disclaimer starts CLOSED
  const [collapsed,  setCollapsed]  = useState(()=>Object.fromEntries(CATS.map(c=>[c.id,true])));
  const [disclaimer, setDisclaimer] = useState(false); // closed by default
  const [sorts,      setSorts]      = useState({});
  const [search,     setSearch]     = useState("");
  const [votes,      setVotes]      = useState(loadVotes);
  const [modal,      setModal]      = useState(null);
  const [form,       setForm]       = useState(emptyForm());
  const [formErr,    setFormErr]    = useState("");

  // Load from API
  useEffect(()=>{
    if(!hasApi){setApiErr("no-api");setLoading(false);return;}
    apiFetch("get")
      .then(data=>{if(Array.isArray(data)&&data.length)setEntries(data);})
      .catch(e=>setApiErr(e.message))
      .finally(()=>setLoading(false));
  },[]);

  // Optimistic mutate + background sync
  const mutate = useCallback((optFn, apiFn)=>{
    setEntries(optFn);
    if(!hasApi) return;
    setSaving(true);
    Promise.resolve(apiFn())
      .then(()=>apiFetch("get"))
      .then(data=>{if(Array.isArray(data)&&data.length)setEntries(data);})
      .catch(e=>alert("Save error: "+e.message))
      .finally(()=>setSaving(false));
  },[]);

  // ‚îÄ‚îÄ Vote (one per item per session, togglable) ‚îÄ‚îÄ
  const handleVote = (id, dir) => {
    const prev = votes[id];           // "up" | "down" | undefined
    const toggling = prev === dir;    // clicking same button = undo
    const newVotes = {...votes};

    if(toggling) delete newVotes[id];
    else newVotes[id] = dir;
    setVotes(newVotes);
    saveVotes(newVotes);

    mutate(entries=>entries.map(e=>{
      if(e.id!==id) return e;
      let up=e.upvotes||0, dn=e.downvotes||0;
      if(prev==="up") up=Math.max(0,up-1);
      if(prev==="down") dn=Math.max(0,dn-1);
      if(!toggling){ if(dir==="up") up++; else dn++; }
      return {...e,upvotes:up,downvotes:dn};
    }), ()=>{
      // Tell API: undo old vote if switching, apply new unless toggling off
      const ops = [];
      if(prev) ops.push(apiFetch("vote",{id,dir:prev,undo:true}));
      if(!toggling) ops.push(apiFetch("vote",{id,dir}));
      return Promise.all(ops);
    });
  };

  // ‚îÄ‚îÄ Entry actions ‚îÄ‚îÄ
  const openAdd = (cat="") => {
    setForm(emptyForm(cat,false));
    setFormErr("");
    setModal({type:"affiliation",cat});
  };

  const openEdit = entry => {
    setForm({
      cat:entry.cat, brand:entry.brand||"", model:entry.model||"",
      type:entry.type||"", url:entry.url||"", recFor:entry.recFor||[],
      affiliated:!!entry.affiliated, reviewText:"", reviewName:""
    });
    setFormErr("");
    setModal({type:"entry",editId:entry.id});
  };

  const submitEntry = () => {
    if(!form.model.trim()){setFormErr("Model name is required.");return;}
    const isEdit = !!modal.editId;
    if(isEdit) {
      const id = modal.editId;
      mutate(
        prev=>prev.map(e=>e.id===id?{...e,...form}:e),
        ()=>apiFetch("update",{entry:{id,...form}})
      );
    } else {
      const reviews = form.reviewText.trim()
        ? [{id:uid(),text:form.reviewText,name:form.reviewName||"Anonymous",ts:Date.now()}]
        : [];
      const newEntry = {id:uid(),...form,upvotes:0,downvotes:0,reviews};
      mutate(
        prev=>[...prev,newEntry],
        ()=>apiFetch("add",{entry:newEntry})
      );
    }
    setModal(null);
  };

  const doDelete = id => {
    mutate(
      prev=>prev.filter(e=>e.id!==id),
      ()=>apiFetch("delete",{id})
    );
    setModal(null);
  };

  // ‚îÄ‚îÄ Review actions ‚îÄ‚îÄ
  const submitReview = (entryId, data, existing) => {
    if(existing) {
      const updated = {...existing,...data};
      mutate(
        prev=>prev.map(e=>e.id===entryId?{...e,reviews:(e.reviews||[]).map(r=>r.id===existing.id?updated:r)}:e),
        ()=>apiFetch("editReview",{entryId,review:updated})
      );
    } else {
      const rev = {id:uid(),...data,ts:Date.now()};
      mutate(
        prev=>prev.map(e=>e.id===entryId?{...e,reviews:[...(e.reviews||[]),rev]}:e),
        ()=>apiFetch("addReview",{entryId,review:rev})
      );
    }
    setModal(null);
  };

  const deleteReview = (entryId, reviewId) => {
    mutate(
      prev=>prev.map(e=>e.id===entryId?{...e,reviews:(e.reviews||[]).filter(r=>r.id!==reviewId)}:e),
      ()=>apiFetch("deleteReview",{entryId,reviewId})
    );
  };

  // ‚îÄ‚îÄ Sort / filter ‚îÄ‚îÄ
  const toggle  = id => setCollapsed(p=>({...p,[id]:!p[id]}));
  const setSort = (catId,col) => setSorts(p=>{
    const cur=p[catId]||{col:"votes",dir:"desc"};
    return {...p,[catId]:{col,dir:cur.col===col?(cur.dir==="desc"?"asc":"desc"):(col==="votes"?"desc":"asc")}};
  });

  const q = search.toLowerCase();
  const getRows = catId => {
    const sort = sorts[catId]||{col:"votes",dir:"desc"};
    const rows = entries.filter(e=>{
      if(e.cat!==catId) return false;
      if(!search) return true;
      const recLabels = recForLabels(e.recFor);
      return [e.brand,e.model,e.type,recLabels,...(e.reviews||[]).flatMap(r=>[r.text,r.name])]
        .some(f=>f?.toLowerCase().includes(q));
    });
    return sortRows(rows,sort.col,sort.dir);
  };

  const modalEntry = modal?.entryId ? entries.find(e=>e.id===modal.entryId) : null;

  return html`<div style=${{fontFamily:"'DM Sans',system-ui,sans-serif",background:"#F1F5F9",minHeight:"100vh"}}>

    <!-- Header -->
    <header style=${{background:"#0F172A",padding:"18px 24px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
      <div style=${{flex:"0 0 auto"}}>
        <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,color:"#F8FAFC",letterSpacing:1}}>Unofficial TTL Gear Guide</div>
        <div style=${{fontSize:12,color:"#64748B",marginTop:1}}>Community picks for triathlon.</div>
      </div>
      <div style=${{flex:1,minWidth:180,display:"flex",alignItems:"center",background:"#1E293B",border:"1px solid #334155",borderRadius:8,padding:"8px 13px",gap:8}}>
        <span style=${{color:"#64748B"}}>üîç</span>
        <input placeholder="Search products, brands, tags, reviews‚Ä¶" value=${search}
          onChange=${e=>setSearch(e.target.value)}
          style=${{background:"none",border:"none",outline:"none",color:"#F1F5F9",fontSize:13,width:"100%",fontFamily:"inherit"}}/>
        ${search && html`<button onClick=${()=>setSearch("")} style=${{background:"none",border:"none",color:"#64748B",fontSize:16,padding:0}}>‚úï</button>`}
      </div>
      <button onClick=${()=>openAdd()}
        style=${{background:"#FF6B35",color:"white",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:500,fontSize:13,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        + Add a pick
      </button>
    </header>

    <!-- Disclaimer (closed by default) -->
    <div style=${{background:"#FFFBEB",borderBottom:"1px solid #FDE68A"}}>
      <div onClick=${()=>setDisclaimer(d=>!d)}
        style=${{padding:"8px 24px",display:"flex",gap:9,alignItems:"center",cursor:"pointer"}}>
        <span style=${{color:"#B45309",flexShrink:0}}>‚öÝ</span>
        <div style=${{flex:1,fontSize:12,color:"#92400E",lineHeight:1.6}}>
          <strong>Disclaimer:</strong>
          ${disclaimer
            ? html` This list is not an official endorsement by TTL leadership or any associated organization. Recommendations reflect personal experience only. Caveat emptor: do your own research before purchasing. Product quality, pricing, and availability may change.`
            : html` This list is not an official endorsement by TTL leadership or any associated organization. Caveat emptor.`}
        </div>
        <span style=${{color:"#D97706",fontSize:11,flexShrink:0}}>${disclaimer?"‚ñ≤":"‚ñº"}</span>
      </div>
    </div>

    <!-- API status -->
    ${apiErr && html`<div style=${{background:"#FEF9C3",borderBottom:"1px solid #FDE047",padding:"8px 24px",fontSize:12,color:"#854D0E"}}>
      ${apiErr==="no-api"?"‚öÝ Demo mode ‚Äî Apps Script URL not configured.":"‚öÝ Backend error: "+apiErr}
    </div>`}

    <!-- Categories -->
    <main style=${{padding:"16px 24px",maxWidth:1400,margin:"0 auto"}}>
      ${loading && html`<div style=${{textAlign:"center",color:"#94A3B8",fontSize:14,padding:40}}>Loading‚Ä¶</div>`}
      ${!loading && CATS.map(cat=>{
        const rows = getRows(cat.id);
        if(search && rows.length===0) return null;
        const open = !collapsed[cat.id];
        const sort = sorts[cat.id]||{col:"votes",dir:"desc"};
        return html`<section key=${cat.id} style=${{marginBottom:10,borderRadius:10,border:"1px solid #E2E8F0",background:"white",overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,0.05)"}}>
          <!-- Cluster header -->
          <div onClick=${()=>toggle(cat.id)}
            style=${{padding:"11px 18px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:cat.accent+"0A",borderBottom:open?("1px solid "+cat.accent+"25"):"none",userSelect:"none"}}>
            <span style=${{fontSize:16}}>${cat.icon}</span>
            <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:cat.accent,letterSpacing:0.5}}>${cat.label.toUpperCase()}</span>
            <span style=${{fontSize:11,color:"#94A3B8",background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:10,padding:"1px 7px"}}>${rows.length}</span>
            <div style=${{flex:1}}/>
            <button onClick=${e=>{e.stopPropagation();openAdd(cat.id);}}
              style=${{background:cat.accent+"15",color:cat.accent,border:"1px solid "+cat.accent+"35",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:3}}>+ Add</button>
            <span style=${{color:"#94A3B8",fontSize:13}}>${open?"‚ñº":"‚ñ∂"}</span>
          </div>

          <!-- Table -->
          ${open && html`<div style=${{overflowX:"auto"}}>
            ${rows.length===0
              ? html`<div style=${{padding:"20px 18px",textAlign:"center",fontSize:13,color:"#94A3B8"}}>No entries yet ‚Äî be the first!</div>`
              : html`<table style=${{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>
                  <${SortTh} label="Votes"   col="votes"   sort=${sort} onSort=${c=>setSort(cat.id,c)} center=${true} width=${95}/>
                  <${SortTh} label="Brand"   col="brand"   sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${110}/>
                  <${SortTh} label="Model"   col="model"   sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${150}/>
                  <${SortTh} label="Type"    col="type"    sort=${sort} onSort=${c=>setSort(cat.id,c)} width=${115}/>
                  <th style=${{padding:"7px 10px",textAlign:"center",color:"#6B7280",fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #E2E8F0",background:"#F8FAFC",width:46}}>Link</th>
                  <th style=${{padding:"7px 10px",textAlign:"left",color:"#6B7280",fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #E2E8F0",background:"#F8FAFC",minWidth:155}}>Good for</th>
                  <${SortTh} label="Reviews" col="reviews" sort=${sort} onSort=${c=>setSort(cat.id,c)}/>
                  <th style=${{padding:"7px 10px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",width:68}}/>
                </tr></thead>
                <tbody>
                  ${rows.map((e,i)=>{
                    const isAff = e.affiliated;
                    return html`<tr key=${e.id} style=${{borderBottom:"1px solid #F1F5F9",background:isAff?"#F8FAFC":i%2===0?"white":"#FAFAFA",opacity:isAff?0.7:1}}>
                      <td style=${{padding:"10px",textAlign:"center",verticalAlign:"top"}}>
                        <${VoteCell} entry=${e} myVote=${votes[e.id]||null} onVote=${dir=>handleVote(e.id,dir)}/>
                        ${isAff && html`<div style=${{fontSize:9,color:"#94A3B8",marginTop:4,fontStyle:"italic"}}>affiliated</div>`}
                      </td>
                      <td style=${{padding:"10px",fontWeight:500,color:isAff?"#94A3B8":"#1E293B",verticalAlign:"top"}}>${e.brand||html`<span style=${{color:"#CBD5E1"}}>‚Äî</span>`}</td>
                      <td style=${{padding:"10px",color:isAff?"#94A3B8":"#334155",verticalAlign:"top"}}>${e.model}</td>
                      <td style=${{padding:"10px",color:"#64748B",fontSize:12,verticalAlign:"top"}}>${e.type||html`<span style=${{color:"#CBD5E1"}}>‚Äî</span>`}</td>
                      <td style=${{padding:"10px",textAlign:"center",verticalAlign:"top"}}>
                        ${e.url ? html`<a href=${e.url} target="_blank" rel="noopener noreferrer" style=${{color:"#6366F1",fontSize:15}}>‚Üó</a>` : html`<span style=${{color:"#E2E8F0"}}>‚Äî</span>`}
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top"}}>
                        <div style=${{display:"flex",flexWrap:"wrap",gap:2}}>
                          ${(e.recFor||[]).map(r=>html`<${RecTag} key=${r} id=${r}/>`)}
                          ${(!e.recFor||e.recFor.length===0) && html`<span style=${{color:"#CBD5E1",fontSize:12}}>‚Äî</span>`}
                        </div>
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top",minWidth:210,maxWidth:310}}>
                        <${ReviewsCell} entry=${e}
                          onAddReview=${id=>setModal({type:"review",entryId:id,existing:null})}
                          onEditReview=${(eid,rv)=>setModal({type:"review",entryId:eid,existing:rv})}
                          onDeleteReview=${deleteReview}/>
                      </td>
                      <td style=${{padding:"10px",verticalAlign:"top",textAlign:"center"}}>
                        <div style=${{display:"flex",flexDirection:"column",gap:5,alignItems:"center"}}>
                          <button onClick=${()=>openEdit(e)}
                            style=${{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 7px",display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748B"}}>‚úè edit</button>
                          <button onClick=${()=>setModal({type:"deleteEntry",entryId:e.id})}
                            style=${{background:"#FFF1F2",border:"1px solid #FECACA",borderRadius:6,padding:"4px 7px",display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#DC2626"}}>üóë delete</button>
                        </div>
                      </td>
                    </tr>`;
                  })}
                </tbody>
              </table>`}
          </div>`}
        </section>`;
      })}
    </main>

    <!-- ‚îÄ‚îÄ Affiliation check ‚îÄ‚îÄ -->
    ${modal?.type==="affiliation" && html`<div style=${OVL}>
      <div style=${{...CARD,maxWidth:440}}>
        <div style=${{fontSize:18,fontWeight:500,color:"#0F172A",marginBottom:10}}>Before you submit</div>
        <p style=${{fontSize:13,color:"#475569",lineHeight:1.75,marginBottom:24}}>
          Are you affiliated with or sponsored by the company you're recommending?<br/><br/>
          <span style=${{fontSize:12,color:"#94A3B8"}}>Affiliated submissions are welcome ‚Äî they'll be clearly labelled and sorted separately.</span>
        </p>
        <div style=${{display:"flex",gap:12}}>
          <button onClick=${()=>{setForm(p=>({...p,affiliated:false}));setModal({type:"entry",editId:null,cat:modal.cat});}}
            style=${{flex:1,padding:"12px",borderRadius:9,border:"1.5px solid #16A34A",background:"#F0FDF4",color:"#16A34A",fontWeight:500,fontSize:13,cursor:"pointer"}}>
            No ‚Äî independent user
          </button>
          <button onClick=${()=>{setForm(p=>({...p,affiliated:true}));setModal({type:"entry",editId:null,cat:modal.cat});}}
            style=${{flex:1,padding:"12px",borderRadius:9,border:"1.5px solid #E2E8F0",background:"#F8FAFC",color:"#64748B",fontWeight:500,fontSize:13,cursor:"pointer"}}>
            Yes ‚Äî affiliated
          </button>
        </div>
        <button onClick=${()=>setModal(null)} style=${{background:"none",border:"none",color:"#94A3B8",fontSize:12,marginTop:14,width:"100%",textAlign:"center",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>`}

    <!-- ‚îÄ‚îÄ Entry form ‚îÄ‚îÄ -->
    ${modal?.type==="entry" && html`<div style=${OVL2}>
      <${EntryForm}
        form=${form} setForm=${setForm} formErr=${formErr}
        isEdit=${!!modal.editId} saving=${saving}
        onCancel=${()=>setModal(null)} onSubmit=${submitEntry}/>
    </div>`}

    <!-- ‚îÄ‚îÄ Delete confirm ‚îÄ‚îÄ -->
    ${modal?.type==="deleteEntry" && html`<div style=${OVL}>
      <div style=${{...CARD,maxWidth:380}}>
        <div style=${{fontSize:17,fontWeight:500,color:"#0F172A",marginBottom:10}}>Delete this entry?</div>
        <p style=${{fontSize:13,color:"#64748B",lineHeight:1.6,marginBottom:20}}>
          ${(()=>{ const e=entries.find(x=>x.id===modal.entryId); return e ? html`<span><strong>${(e.brand?e.brand+" ":"")+e.model}</strong> and all its reviews will be permanently removed.</span>` : ""; })()}
        </p>
        <div style=${{display:"flex",gap:10}}>
          <button onClick=${()=>setModal(null)} style=${{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"white",color:"#64748B",fontWeight:500,fontSize:13,cursor:"pointer"}}>Cancel</button>
          <button onClick=${()=>doDelete(modal.entryId)} style=${{flex:1,padding:"10px",borderRadius:8,border:"none",background:"#DC2626",color:"white",fontWeight:500,fontSize:13,cursor:"pointer"}}>Yes, delete</button>
        </div>
      </div>
    </div>`}

    <!-- ‚îÄ‚îÄ Review form ‚îÄ‚îÄ -->
    ${modal?.type==="review" && html`<div style=${OVL}>
      <${ReviewForm}
        entry=${entries.find(e=>e.id===modal.entryId)}
        existingReview=${modal.existing}
        saving=${saving}
        onCancel=${()=>setModal(null)}
        onSubmit=${data=>submitReview(modal.entryId,data,modal.existing)}/>
    </div>`}

  </div>`;
}

render(html`<${App}/>`, document.getElementById("root"));
</script>
</body>
</html>
